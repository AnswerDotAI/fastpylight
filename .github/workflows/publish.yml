name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo test

  linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13
          manylinux: auto
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-linux
          path: dist

  macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - uses: astral-sh/setup-uv@v7
      - run: uv publish 'wheels-*/*'
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" wheels-*/* --generate-notes --title "$GITHUB_REF_NAME"
