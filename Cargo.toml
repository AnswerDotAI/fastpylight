[package]
name = "fastpylight"
version = "0.1.6"
edition = "2021"

[lib]
name = "fastpylight"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
inkjet = { version = "0.11", features = ["all_languages", "theme"] }
tree-sitter = "0.23"
tree-sitter-highlight = "0.23"
tree-sitter-md = "0.3"
