[package]
name = "fastpylight"
version = "0.1.6"
edition = "2021"

[lib]
name = "fastpylight"
crate-type = ["rlib", "cdylib"]

[features]
default = ["all-languages", "themes"]
python = ["dep:pyo3"]
extension-module = ["python", "pyo3/extension-module"]
all-languages = ["inkjet/all_languages"]
language-python = ["inkjet/language-python"]
themes = ["inkjet/theme"]

[dependencies]
pyo3 = { version = "0.22", optional = true }
inkjet = { version = "0.11", default-features = false }
thiserror = "1"
tree-sitter = "0.23"
tree-sitter-highlight = "0.23"
tree-sitter-md = "0.3"
